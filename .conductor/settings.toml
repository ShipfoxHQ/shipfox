"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

[scripts]
run_mode = "concurrent"
setup = """
set -e
mise trust
mise install
if [ "${CONDUCTOR_IS_LOCAL:-1}" = "1" ]; then
  if [ -n "${CONDUCTOR_ROOT_PATH:-}" ]; then
    mise -C "$CONDUCTOR_ROOT_PATH" trust
    mise -C "$CONDUCTOR_ROOT_PATH" install
  fi
fi
mise exec -- pnpm -r install --frozen-lockfile
if [ "${CONDUCTOR_IS_LOCAL:-1}" = "1" ]; then
  mise run ollama:up
  mise exec -- pnpm dev:services:up
fi
"""
archive = """
if [ "${CONDUCTOR_IS_LOCAL:-1}" = "1" ]; then
  mise exec -- pnpm dev:services:destroy
fi
"""

[scripts.run.dev]
command = "SHIPFOX_CLIENT_OPEN=1 mise exec -- pnpm dev"
default = true
icon = "play"

[scripts.run.docs]
command = "mise exec -- pnpm --filter=@shipfox/docs dev"
icon = "book-open"
