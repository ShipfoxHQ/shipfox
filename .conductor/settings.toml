"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

[scripts]
run_mode = "concurrent"
setup = """
mise trust
mise install
if [ "${CONDUCTOR_IS_LOCAL:-1}" = "1" ]; then
  if [ -n "${CONDUCTOR_ROOT_PATH:-}" ]; then
    mise -C "$CONDUCTOR_ROOT_PATH" trust
    mise -C "$CONDUCTOR_ROOT_PATH" install
  fi
  mise run ollama:up
  mise exec -- node dev/worktree-services.mjs up
fi
mise exec -- pnpm -r install --frozen-lockfile
"""
archive = """
if [ "${CONDUCTOR_IS_LOCAL:-1}" = "1" ]; then
  mise exec -- node "${CONDUCTOR_ROOT_PATH:-$PWD}/dev/worktree-services.mjs" destroy
fi
"""

[scripts.run.dev]
command = "SHIPFOX_CLIENT_OPEN=1 mise exec -- turbo dev --filter=@shipfox/api --filter=@shipfox/client"
default = true
icon = "play"

[scripts.run.docs]
command = "mise exec -- pnpm --filter=@shipfox/docs dev"
icon = "book-open"
