strictPeerDependencies: true
dedupePeerDependents: true
nodeLinker: isolated
minimumReleaseAge: 2880
# The Mintlify CLI (@shipfox/docs devDependency) ships packages built for React 18;
# this repo is React 19. Let React 19 satisfy those peer ranges so mint installs under
# the strict peer policy. This whole repo is React 19, so the allowance is safe.
peerDependencyRules:
  allowedVersions:
    react: '19'
    react-dom: '19'
allowBuilds:
  '@google/genai': true
  '@scarf/scarf': false
  '@swc/core': true
  cpu-features: true
  esbuild: true
  keytar: false
  protobufjs: true
  puppeteer: false
  sharp: true
  ssh2: true

packages:
  - "apps/*"
  - "e2e/**"
  - "libs/**"
  - "infra/**"
  - "tools/**"
  - "turbo/**"
  - "!**/vite/types/**"
  - "!**/node_modules/**"
