name: Listening workflow
runner: ubuntu-latest
jobs:
  review:
    name: Review batch ${{ execution.index }}
    on:
      - source: github
        event: pull_request_review
    until:
      - source: github
        event: pull_request
    timeout: 30d
    max_executions: 3
    batch:
      debounce: 5s
      max_size: 10
      max_wait: 1h
    on_resolve: cancel
    steps:
      - prompt: Review ${{ execution.events[0].data.body }}
