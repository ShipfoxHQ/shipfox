name: Build and deploy
runner: ubuntu-latest
triggers:
  on_demand:
    source: manual
    event: fire
  on_push:
    source: gitea
    event: push
    filter: 'event.ref == "refs/heads/main"'
jobs:
  prepare:
    steps:
      - key: checkout-summary
        name: Checkout Summary
        run: echo "Preparing demo workspace"
      - key: validate-package
        name: Validate Package
        run: node --check src/index.js
  test:
    needs: prepare
    steps:
      - key: unit-tests
        name: Unit Tests
        run: node --test
      - key: forced-failure
        name: Forced Failure
        run: |
          echo "Intentional demo failure"
          exit 1
      - key: skipped-after-failure
        name: Skipped After Failure
        run: echo "This step is cancelled after the forced failure"
  deploy:
    needs: test
    steps:
      - key: package
        name: Package
        run: echo "Packaging demo"
      - key: publish
        name: Publish
        run: echo "Deploying demo"
