name: Gates
runner: ubuntu-latest
triggers:
  on_demand:
    source: manual
    event: fire
  on_push:
    source: gitea
    event: push
    filter: 'event.ref == "refs/heads/main"'
jobs:
  gated-retry:
    steps:
      - key: first-setup
        name: First setup
        run: mkdir -p .shipfox/demo-gates
      - key: first-gate
        name: First gate
        run: |
          marker=.shipfox/demo-gates/first-gate-passed
          if [ ! -f "$marker" ]; then
            touch "$marker"
            echo "First gate fails once"
            exit 1
          fi
          echo "First gate passed"
        gate:
          success: step.exit_code == 0
          on_failure:
            restart_from: first-setup
            feedback: First gate failed once; retrying from first setup.
      - key: second-setup
        name: Second setup
        run: mkdir -p .shipfox/demo-gates
      - key: second-gate
        name: Second gate
        run: |
          marker=.shipfox/demo-gates/second-gate-passed
          if [ ! -f "$marker" ]; then
            touch "$marker"
            echo "Second gate fails once"
            exit 1
          fi
          echo "Second gate passed"
        gate:
          success: step.exit_code == 0
          on_failure:
            restart_from: second-setup
            feedback: Second gate failed once; retrying from second setup.
      - key: third-gate
        name: Third gate
        run: |
          counter=.shipfox/demo-gates/third-gate-attempts
          attempts=0
          if [ -f "$counter" ]; then
            attempts=$(cat "$counter")
          fi
          attempts=$((attempts + 1))
          printf '%s\n' "$attempts" > "$counter"
          if [ "$attempts" -le 2 ]; then
            echo "Third gate fails attempt $attempts of 2"
            exit 1
          fi
          echo "Third gate passed on attempt $attempts"
        gate:
          success: step.exit_code == 0
          on_failure:
            restart_from: second-setup
            feedback: Third gate failed; retrying from second setup.
      - key: finish
        name: Finish
        run: echo "All three gates passed; job succeeded"
