name: Agent Claude
runner: ubuntu-latest
triggers:
  on_demand:
    source: manual
    event: fire
  on_push:
    source: gitea
    event: push
    filter: 'event.ref == "refs/heads/main"'
jobs:
  greet:
    steps:
      - harness: claude
        provider: anthropic
        model: claude-haiku-4-5
        prompt: Say hello from Claude
