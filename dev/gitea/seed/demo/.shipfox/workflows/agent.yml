name: Agent
runner: ubuntu-latest
triggers:
  on_demand:
    source: manual
    event: fire
  on_push:
    source: gitea
    event: push
    filter: 'event.ref == "refs/heads/main"'
jobs:
  greet:
    steps:
      - provider: openrouter
        model: meta-llama/llama-3.1-8b-instruct
        prompt: Say hello
