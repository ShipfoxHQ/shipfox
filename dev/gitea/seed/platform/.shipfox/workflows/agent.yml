name: Agent
triggers:
  on_demand:
    source: manual
    event: fire
jobs:
  fix:
    steps:
      - name: implement
        model: claude-opus-4-8
        prompt: Fix the failing tests.
      - name: review
        model: gpt-5.1
        provider: openai
        prompt: Review the fix.
        thinking: low
        gate:
          success_if: exit_code == 0
          on_failure:
            restart_from: implement
      - run: pnpm test
        gate:
          success_if: exit_code == 0
