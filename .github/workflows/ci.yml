name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    name: Check, test, type, and build
    runs-on: ubuntu-latest
    # On a PR the image steps below validate the Dockerfiles (single-arch, no push);
    # the main-only publish-images job does the real multi-arch push to GHCR.
    timeout-minutes: 40
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: shipfox
      # Only approved code on main may publish remote cache artifacts. Pull
      # requests can restore trusted artifacts from main, but cannot poison cache.
      TURBO_CACHE: ${{ github.ref == 'refs/heads/main' && 'local:rw,remote:rw' || 'local:rw,remote:r' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start test services
        run: docker compose up --wait -d postgres temporal garage garage-init

      - name: Install Playwright browsers
        run: pnpm --filter=@shipfox/playwright exec playwright install --with-deps chromium

      - name: Run verification
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
        run: turbo check type test build depcruise

      - name: Run E2E tests
        id: e2e
        env:
          API_URL: http://localhost:16101
          CLIENT_URL: http://localhost:5173
          E2E_ADMIN_API_KEY: e2e-admin-api-key
          E2E_ENABLED: "true"
          VITE_API_URL: http://localhost:16101
          VITE_ENABLE_TEST_VCS_PROVIDER: "true"
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
        run: |
          set -euo pipefail

          log_dir="$RUNNER_TEMP/shipfox-e2e-logs"
          mkdir -p "$log_dir"

          pnpm --filter=@shipfox/api dev > "$log_dir/shipfox-api.log" 2>&1 &
          api_pid=$!
          pnpm --filter=@shipfox/client dev > "$log_dir/shipfox-client.log" 2>&1 &
          client_pid=$!
          trap 'kill $api_pid $client_pid 2>/dev/null || true' EXIT

          wait_for() {
            timeout 60 bash -c 'until curl --fail --silent "$1" >/dev/null; do sleep 1; done' _ "$1"
          }

          wait_for "$API_URL/readyz"
          wait_for "$CLIENT_URL"
          turbo test:e2e

      - name: Upload E2E API logs
        if: failure() && steps.e2e.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: e2e-api-logs
          path: ${{ runner.temp }}/shipfox-e2e-logs/shipfox-api.log
          if-no-files-found: error

      # On a PR, validate that each Dockerfile still builds. Single-arch with --load
      # (a multi-arch build cannot load) and no push; guarded with success() so it
      # runs only after the checks, tests, and E2E above pass, reusing the dist/
      # already built by "Run verification". On main these steps are skipped: the
      # publish-images job does the real multi-arch push, so the test job stays
      # least-privileged (no packages: write).
      - name: Set up Docker Buildx
        if: success() && github.ref != 'refs/heads/main'
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build images
        if: success() && github.ref != 'refs/heads/main'
        run: |
          set -euo pipefail
          # With IMAGE_REGISTRIES unset, shipfox-docker tags each image <app>:ci.
          turbo image --concurrency=1 \
            --filter @shipfox/api \
            --filter @shipfox/client \
            --filter @shipfox/runner -- \
            --platform linux/amd64 --load \
            --build-arg "IMAGE_REVISION=${GITHUB_SHA}" \
            --build-arg "IMAGE_CREATED=$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # Publish the per-commit images. A separate, main-only job that depends on ci, so
  # images are only built for a commit whose checks, tests, and E2E passed, and the
  # packages: write scope never reaches a pull_request run. Re-restoring the build
  # from the turbo cache here is the cost of keeping that write scope isolated.
  publish-images:
    name: Publish app images
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Multi-arch: linux/arm64 builds under QEMU emulation, slow on a cold gha BuildKit
    # cache (the runner image's apt layer most of all); the cache makes later runs fast.
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write # push images to GHCR
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: shipfox
      TURBO_CACHE: local:rw,remote:rw

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          # CI supplies the ref: the registry bases (IMAGE_REGISTRIES) plus the commit
          # identity (BUILD_NUMBER, GITHUB_SHA, GITHUB_REF_NAME). shipfox-docker
          # assembles each app's sha-/build-/<branch> tags from it, so one command tags
          # all three. Only GHCR is configured; add Docker Hub by appending its base to
          # IMAGE_REGISTRIES and adding a matching login step.
          export IMAGE_REGISTRIES="ghcr.io/$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          # --concurrency=1: three concurrent multi-arch QEMU builds would contend for
          # the runner's CPUs; build cache hits keep the serialized run cheap.
          turbo image --concurrency=1 \
            --filter @shipfox/api \
            --filter @shipfox/client \
            --filter @shipfox/runner -- \
            --build-arg "IMAGE_REVISION=${GITHUB_SHA}" \
            --build-arg "IMAGE_CREATED=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
