name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: shipfox
  # Only approved code on main may write remote cache artifacts. Pull requests
  # can restore trusted artifacts from main, but cannot overwrite them.
  TURBO_CACHE: ${{ github.ref == 'refs/heads/main' && 'local:rw,remote:rw' || 'local:rw,remote:r' }}

# Parallel jobs cannot share PR-written remote cache artifacts, so each job
# rebuilds what its own Turbo graph needs.
jobs:
  ci:
    name: Check, test, type, and build
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      SHIPFOX_TURBO_CONCURRENCY: "2"
      SHIPFOX_VITEST_MAX_WORKERS: "2"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start test services
        run: docker compose up --wait -d postgres temporal garage garage-init

      # `turbo test` includes client Vitest browser tests, so Chromium is
      # required in the verification job too.
      - name: Install Playwright browsers
        run: pnpm --filter=@shipfox/playwright exec playwright install --with-deps chromium

      - name: Run verification
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
        run: turbo check type test build depcruise --concurrency="$SHIPFOX_TURBO_CONCURRENCY"

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start test services
        run: docker compose up --wait -d postgres temporal garage garage-init

      - name: Install Playwright browsers
        run: pnpm --filter=@shipfox/playwright exec playwright install --with-deps chromium

      # E2E dev servers still depend on dist/ for Temporal workflow bundles and
      # the shared vite-dev bin.
      - name: Build dev server dependencies
        run: turbo build --filter @shipfox/api --filter @shipfox/vite

      - name: Run E2E tests
        id: e2e
        env:
          API_URL: http://localhost:16101
          CLIENT_URL: http://localhost:5173
          E2E_ADMIN_API_KEY: e2e-admin-api-key
          E2E_ENABLED: "true"
          VITE_API_URL: http://localhost:16101
          VITE_ENABLE_TEST_VCS_PROVIDER: "true"
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
        run: |
          set -euo pipefail

          log_dir="$RUNNER_TEMP/shipfox-e2e-logs"
          mkdir -p "$log_dir"

          pnpm --filter=@shipfox/api dev > "$log_dir/shipfox-api.log" 2>&1 &
          api_pid=$!
          pnpm --filter=@shipfox/client dev > "$log_dir/shipfox-client.log" 2>&1 &
          client_pid=$!
          trap 'kill $api_pid $client_pid 2>/dev/null || true' EXIT

          wait_for() {
            timeout 60 bash -c 'until curl --fail --silent "$1" >/dev/null; do sleep 1; done' _ "$1"
          }

          wait_for "$API_URL/readyz"
          wait_for "$CLIENT_URL"
          turbo test:e2e

      - name: Upload E2E server logs
        if: failure() && steps.e2e.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: e2e-server-logs
          path: ${{ runner.temp }}/shipfox-e2e-logs/
          if-no-files-found: error

  # PR image validation stays separate so it can run without package write
  # permission. Main publishes images in `publish-images`.
  build-images:
    name: Build images
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      # Extra turbo args enter every task hash; shipfox-docker reads image
      # metadata from the environment instead. Serialize Docker builds to avoid
      # runner CPU and memory contention.
      - name: Build images
        run: turbo image --concurrency=1 --filter @shipfox/api --filter @shipfox/client --filter @shipfox/runner

  # Publishing stays in a main-only job so package write permission is granted
  # only after verification and E2E pass. It restores build output from Turbo's
  # cache instead of inheriting artifacts from less-privileged jobs.
  publish-images:
    name: Publish app images
    needs: [ci, e2e]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Multi-arch: linux/arm64 builds under QEMU emulation, slow on a cold gha BuildKit
    # cache (the runner image's apt layer most of all); the cache makes later runs fast.
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write # push images to GHCR

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          # CI supplies the ref through the environment: the registry base
          # (IMAGE_REGISTRIES) plus the commit identity (BUILD_NUMBER, GITHUB_SHA,
          # GITHUB_REF_NAME). shipfox-docker assembles each app's sha-/build-/latest
          # tags and build metadata from it, so no turbo `--` args are needed (those
          # would bust the build cache). Only GHCR is configured; add Docker Hub by
          # appending its base to IMAGE_REGISTRIES and adding a matching login step.
          export IMAGE_REGISTRIES="ghcr.io/$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          # --concurrency=1: serialize the three multi-arch QEMU builds so they don't
          # contend for the runner's CPUs (build deps are cache hits regardless).
          turbo image --concurrency=1 \
            --filter @shipfox/api \
            --filter @shipfox/client \
            --filter @shipfox/runner
