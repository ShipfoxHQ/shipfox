name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

# Cancel superseded PR/branch runs before they finish, so rapid pushes stop paying
# for CI work they already invalidated. main is never cancelled: every merged commit
# must run to completion to publish or reuse its per-commit release artifacts.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: shipfox
  # Pull requests only run tasks affected between their base and head commits.
  # main leaves the filter empty and continues to run the complete task graph.
  SHIPFOX_TURBO_AFFECTED: ${{ github.event_name == 'pull_request' && '--affected' || '' }}
  TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha }}
  TURBO_SCM_HEAD: ${{ github.event.pull_request.head.sha }}
  # Only approved code on main may write remote cache artifacts. Pull requests
  # can restore trusted artifacts from main, but cannot overwrite them.
  TURBO_CACHE: ${{ github.ref == 'refs/heads/main' && 'local:rw,remote:rw' || 'local:rw,remote:r' }}

# Parallel jobs cannot share PR-written remote cache artifacts, so each job
# rebuilds what its own Turbo graph needs.
jobs:
  release-classification:
    name: Classify release PR or version-only main commit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      generated_release: ${{ steps.classify.outputs.generated_release || 'false' }}
      version_only_main: ${{ steps.classify-main.outputs.version_only_main || 'false' }}
      version_only_previous_revision: ${{ steps.classify-main.outputs.version_only_previous_revision || '' }}
      version_only_release_pr: ${{ steps.classify-main.outputs.version_only_release_pr || '' }}
      reason: ${{ steps.classify.outputs.reason || steps.classify-main.outputs.reason || 'not-a-release-pr' }}

    steps:
      - name: Check out repository
        if: (github.event_name == 'pull_request' || github.ref == 'refs/heads/main') && vars.FORCE_FULL_CI != 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up mise
        if: (github.event_name == 'pull_request' || github.ref == 'refs/heads/main') && vars.FORCE_FULL_CI != 'true'
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      - name: Set up pnpm
        if: (github.event_name == 'pull_request' || github.ref == 'refs/heads/main') && vars.FORCE_FULL_CI != 'true'
        uses: ./.github/actions/setup-pnpm

      - name: Mint release App installation token
        id: release-app-token
        if: >-
          vars.FORCE_FULL_CI != 'true' &&
          ((github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          github.event.pull_request.head.ref == 'changeset-release/main') ||
          github.ref == 'refs/heads/main')
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_APP_PRIVATE_KEY }}

      - name: Resolve release App bot user ID
        id: release-app
        if: steps.release-app-token.outcome == 'success'
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
          RELEASE_APP_SLUG: ${{ steps.release-app-token.outputs.app-slug }}
        run: echo "user_id=$(gh api "/users/${RELEASE_APP_SLUG}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Build generated-release verifier
        if: (github.event_name == 'pull_request' || github.ref == 'refs/heads/main') && vars.FORCE_FULL_CI != 'true'
        run: turbo build --filter=@shipfox/package-release

      - name: Verify generated release tree
        id: classify
        if: github.event_name == 'pull_request' && vars.FORCE_FULL_CI != 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PULL_REQUEST_AUTHOR_ID: ${{ github.event.pull_request.user.id }}
          RELEASE_BOT_USER_ID: ${{ steps.release-app.outputs.user_id }}
        run: |
          set +e
          pnpm --silent --filter=@shipfox/package-release verify-generated-release -- \
            --base "$BASE_SHA" \
            --head "$HEAD_SHA" \
            --repository "$GITHUB_REPOSITORY" \
            --head-repository "$HEAD_REPOSITORY" \
            --head-ref "$HEAD_REF" \
            --author-id "$PULL_REQUEST_AUTHOR_ID" \
            --release-app-id "$RELEASE_BOT_USER_ID" \
            > "$RUNNER_TEMP/release-verification.json"
          verifier_status=$?
          set -e

          result="$(tail -n 1 "$RUNNER_TEMP/release-verification.json")"
          classification="$(jq -r '.classification // "unknown"' <<< "$result" 2>/dev/null || true)"
          reason="$(jq -r '.reason // "verification-error"' <<< "$result" 2>/dev/null || true)"
          generated_release=false
          if [[ "$verifier_status" == 0 && "$classification" == generated-release ]]; then
            generated_release=true
          fi

          echo "generated_release=$generated_release" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"

      - name: Verify version-only main commit
        id: classify-main
        if: github.ref == 'refs/heads/main' && vars.FORCE_FULL_CI != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_BOT_USER_ID: ${{ steps.release-app.outputs.user_id }}
          REVISION: ${{ github.sha }}
        run: |
          node .github/scripts/package-release-workflow.mjs classify-main \
            --revision "$REVISION" \
            --repository "$GITHUB_REPOSITORY" \
            --release-app-id "$RELEASE_BOT_USER_ID" \
            --github-output "$GITHUB_OUTPUT" \
            --github-summary "$GITHUB_STEP_SUMMARY"

  release-mode:
    name: Select CI execution mode
    needs: [release-classification]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      mode: ${{ steps.select.outputs.mode }}
      previous_revision: ${{ needs.release-classification.outputs.version_only_previous_revision }}
      release_pr: ${{ needs.release-classification.outputs.version_only_release_pr }}

    steps:
      - name: Normalize release classification
        id: select
        env:
          CLASSIFICATION_RESULT: ${{ needs.release-classification.result }}
          GENERATED_RELEASE: ${{ needs.release-classification.outputs.generated_release }}
          VERSION_ONLY_MAIN: ${{ needs.release-classification.outputs.version_only_main }}
        run: |
          mode=normal
          if [[ "$CLASSIFICATION_RESULT" == success ]]; then
            if [[ "$VERSION_ONLY_MAIN" == true ]]; then
              mode=version-only-main
            elif [[ "$GENERATED_RELEASE" == true ]]; then
              mode=generated-release
            fi
          fi

          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "Selected CI mode: $mode" >> "$GITHUB_STEP_SUMMARY"

  static-verification:
    name: Static verification
    needs: [release-mode]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      SHIPFOX_TURBO_CONCURRENCY: "4"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up mise
        uses: ./.github/actions/setup-mise
        with:
          tools: node npm:pnpm npm:turbo

      - name: Set up pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Run static verification
        if: always() && (needs.release-mode.result != 'success' || needs.release-mode.outputs.mode == 'normal')
        run: turbo check type build depcruise $SHIPFOX_TURBO_AFFECTED --concurrency="$SHIPFOX_TURBO_CONCURRENCY"

      - name: Verify repository and package policies
        if: always() && (needs.release-mode.result != 'success' || needs.release-mode.outputs.mode == 'normal')
        run: turbo verify --concurrency="$SHIPFOX_TURBO_CONCURRENCY"

      - name: Verify release metadata and publication closure
        if: always() && needs.release-mode.result == 'success' && needs.release-mode.outputs.mode != 'normal'
        run: |
          turbo verify --filter=@shipfox/package-release...
          turbo test --filter=@shipfox/package-release...
          pnpm run release:preflight

      - name: Summarize verified release CI
        if: always() && needs.release-mode.result == 'success' && needs.release-mode.outputs.mode != 'normal'
        env:
          BASE_SHA: ${{ needs.release-mode.outputs.previous_revision || github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          RELEASE_MODE: ${{ needs.release-mode.outputs.mode }}
          RELEASE_PR_URL: ${{ needs.release-mode.outputs.release_pr }}
        run: |
          {
            if [[ "$RELEASE_MODE" == version-only-main ]]; then
              echo '## Verified version-only main CI'
              echo
              echo '- Classification: `version-only-main` (deterministic tree verification passed)'
              echo "- Generated release PR: ${RELEASE_PR_URL:-unavailable}"
              echo "- Prior validated revision: \`${BASE_SHA}\`"
            else
              echo '## Verified generated release CI'
              echo
              echo '- Classification: `generated-release` (deterministic tree verification passed)'
            fi
            echo
            echo '- Files in release:'
            git diff --name-only "$BASE_SHA" "$HEAD_SHA" | sed 's/^/  - `/' | sed 's/$/`/'
            echo '- Package directories changed:'
            git diff --name-only "$BASE_SHA" "$HEAD_SHA" | awk -F/ '/^(libs|tools)\// {print $1 "/" $2}' | sort -u | sed 's/^/  - `/' | sed 's/$/`/'
            echo '- Checks run: frozen dependency install, package-release policy checks and tests, whole-closure `release:preflight`.'
            echo '- Checks intentionally skipped: unit/story suite, E2E suite, application image rebuilds, and Packer runner candidates.'
            echo '- Preflight result: passed.'
            echo '- Expected comparison: under 5 minutes and under 7.65 runner-minutes, versus the 13-minute / 51 runner-minute baseline.'
          } >> "$GITHUB_STEP_SUMMARY"

  external-package-contracts:
    name: Verify external package contracts
    needs: [release-mode]
    if: always() && (needs.release-mode.result != 'success' || needs.release-mode.outputs.mode == 'normal')
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      SHIPFOX_TURBO_CONCURRENCY: "4"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up mise
        uses: ./.github/actions/setup-mise
        with:
          tools: node npm:pnpm npm:turbo

      - name: Set up pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Prepare external package contracts
        run: |
          turbo build type:emit \
            --filter=@shipfox/application-release... \
            --filter=@shipfox/api... \
            --filter=@shipfox/client-shell... \
            --filter=@shipfox/client-features... \
            --concurrency="$SHIPFOX_TURBO_CONCURRENCY"

      - name: Verify packed API runtime closure
        run: pnpm --filter=@shipfox/application-release test:external

      - name: Verify packed client composition
        run: pnpm --filter=@shipfox/client-shell test:external

  publication-preflight:
    name: Package publication preflight
    needs: [release-mode]
    if: always() && (needs.release-mode.result != 'success' || needs.release-mode.outputs.mode == 'normal')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up mise
        uses: ./.github/actions/setup-mise
        with:
          tools: node npm:pnpm npm:turbo

      - name: Set up pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Preflight package publication closure
        run: pnpm run release:preflight

  tests:
    name: Unit and story tests
    needs: [release-mode]
    if: always() && (needs.release-mode.result != 'success' || needs.release-mode.outputs.mode == 'normal')
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      SHIPFOX_TURBO_CONCURRENCY: "4"
      SHIPFOX_VITEST_MAX_WORKERS: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Start test services
        id: test-services
        run: |
          docker compose up --wait -d postgres temporal garage
          docker compose run --rm garage-init
        background: true

      - name: Set up mise
        uses: ./.github/actions/setup-mise
        with:
          tools: node npm:pnpm npm:turbo

      - name: Set up pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Set up Playwright
        uses: ./.github/actions/setup-playwright

      - name: Wait for test services
        wait: test-services

      - name: Build database catalog verifier
        run: turbo build --filter=@shipfox/api-database-policy

      - name: Verify fresh PostgreSQL catalog
        env:
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: "5432"
          POSTGRES_USERNAME: shipfox
          POSTGRES_PASSWORD: password
          POSTGRES_DATABASE: api
          POSTGRES_TLS_MODE: disable
        run: |
          set +e
          pnpm --silent --filter=@shipfox/api-database-policy verify:catalog --json \
            > "$RUNNER_TEMP/api-database-catalog.json"
          verifier_exit=$?
          set -e

          if [[ -s "$RUNNER_TEMP/api-database-catalog.json" ]]; then
            jq '{databaseName, serverVersion, counts, findings}' \
              "$RUNNER_TEMP/api-database-catalog.json" \
              | tee "$RUNNER_TEMP/api-database-catalog.diff.json"
          fi
          if (( verifier_exit != 0 )); then
            exit "$verifier_exit"
          fi

      - name: Upload database catalog diff
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: api-database-catalog-diff
          path: |
            ${{ runner.temp }}/api-database-catalog.json
            ${{ runner.temp }}/api-database-catalog.diff.json
          if-no-files-found: ignore

      - name: Run tests
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
        run: turbo test $SHIPFOX_TURBO_AFFECTED --concurrency="$SHIPFOX_TURBO_CONCURRENCY"

  e2e:
    name: E2E tests
    needs: [release-mode]
    if: always() && (needs.release-mode.result != 'success' || needs.release-mode.outputs.mode == 'normal')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Reserve one of the runner's four CPUs for the API/client processes,
      # Docker services, and Ollama-backed provider validation.
      SHIPFOX_TURBO_CONCURRENCY: "3"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Start test services
        id: test-services
        env:
          SHIPFOX_GITEA_HTTP_HOST: 0.0.0.0
        run: |
          docker compose up --wait -d postgres temporal garage gitea
          docker compose run --rm garage-init
          docker compose run --rm gitea-init
        background: true

      - name: Set up mise
        uses: ./.github/actions/setup-mise
        with:
          tools: node npm:pnpm npm:turbo

      - name: Set up pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Set up Playwright
        uses: ./.github/actions/setup-playwright

      - name: Wait for test services
        wait: test-services

      - name: Run E2E tests
        id: e2e
        env:
          API_URL: http://localhost:16101
          AGENT_PROVIDER_VALIDATION_TIMEOUT_MS: "60000"
          CLIENT_URL: http://localhost:5173
          E2E_ADMIN_API_KEY: e2e-admin-api-key
          E2E_ENABLED: "true"
          GITEA_CLONE_BASE_URL: http://localhost:3000
          HOST: 0.0.0.0
          VITE_API_URL: http://localhost:16101
          VITE_ENABLE_TEST_VCS_PROVIDER: "true"
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
        run: |
          if [[ -n "$SHIPFOX_TURBO_AFFECTED" ]]; then
            mise run e2e -- "$SHIPFOX_TURBO_AFFECTED"
          else
            mise run e2e
          fi

      - name: Upload E2E diagnostics
        if: failure() && steps.e2e.outcome == 'failure'
        timeout-minutes: 3
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: e2e-diagnostics
          path: ${{ runner.temp }}/shipfox-e2e-logs/
          if-no-files-found: error

  # PR image validation stays separate so it can run without package write
  # permission. Main publishes images in `publish-images`.
  build-image:
    name: Build image (${{ matrix.image }})
    needs: [release-mode]
    if: always() && github.ref != 'refs/heads/main' && (needs.release-mode.result != 'success' || needs.release-mode.outputs.mode == 'normal')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include: &app_image_matrix
          - package: "@shipfox/api"
            image: api
            repository: ghcr.io/shipfoxhq/api
          - package: "@shipfox/client"
            image: client
            repository: ghcr.io/shipfoxhq/client
          - package: "@shipfox/provisioner-docker"
            image: provisioner-docker
            repository: ghcr.io/shipfoxhq/provisioner-docker
          - package: "@shipfox/provisioner-ec2"
            image: provisioner-ec2
            repository: ghcr.io/shipfoxhq/provisioner-ec2
          - package: "@shipfox/runner"
            image: runner
            repository: ghcr.io/shipfoxhq/runner

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up mise
        uses: ./.github/actions/setup-mise
        with:
          tools: node npm:pnpm npm:turbo

      - name: Set up pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      # --affected skips images untouched by the PR. The Docker wrapper validates
      # PR builds with BuildKit's cache-only output, so no local image import runs.
      - name: Build images
        run: turbo image --affected --filter "${{ matrix.package }}"

  build-images:
    name: Build images
    needs: [release-mode, build-image]
    if: always() && github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Report image validation
        run: |
          if [ "${{ needs.build-image.result }}" = "success" ]; then
            echo "Image validation matrix completed."
            exit 0
          fi
          if [ "${{ needs.release-mode.result }}" = "success" ] && [ "${{ needs.release-mode.outputs.mode }}" = "generated-release" ] && [ "${{ needs.build-image.result }}" = "skipped" ]; then
            echo "Image validation matrix intentionally skipped for a verified generated release PR."
            exit 0
          fi
          if [ "${{ needs.build-image.result }}" != "success" ]; then
            echo "Image validation matrix result: ${{ needs.build-image.result }}"
            exit 1
          fi

  # Publishing stays in a main-only job so package write permission is granted
  # only after verification and E2E pass. It restores build output from Turbo's
  # cache instead of inheriting artifacts from less-privileged jobs.
  publish-images:
    name: Publish app image (${{ matrix.image }})
    needs: [release-mode, static-verification, external-package-contracts, tests, e2e]
    if: >-
      always() && github.ref == 'refs/heads/main' &&
      needs.release-mode.result == 'success' &&
      needs.static-verification.result == 'success' &&
      (needs.external-package-contracts.result == 'success' || (needs.release-mode.outputs.mode == 'version-only-main' && needs.external-package-contracts.result == 'skipped')) &&
      (needs.tests.result == 'success' || needs.tests.result == 'skipped') &&
      (needs.e2e.result == 'success' || needs.e2e.result == 'skipped')
    runs-on: ubuntu-latest
    # Multi-arch: linux/arm64 builds under QEMU emulation, slow on a cold gha BuildKit
    # cache (the runner image's apt layer most of all); the cache makes later runs fast.
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include: *app_image_matrix
    permissions:
      contents: read
      packages: write # push images to GHCR

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up ORAS
        uses: oras-project/setup-oras@1d808f7d7f6995cc68b7bf507bfe5c5446e1dc9d # v2
        with:
          version: 1.3.3

      - name: Set up mise
        if: needs.release-mode.outputs.mode != 'version-only-main'
        uses: ./.github/actions/setup-mise
        with:
          tools: node npm:pnpm npm:turbo

      - name: Set up pnpm
        if: needs.release-mode.outputs.mode != 'version-only-main'
        uses: ./.github/actions/setup-pnpm

      - name: Set up QEMU
        if: needs.release-mode.outputs.mode != 'version-only-main'
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Docker Buildx
        if: needs.release-mode.outputs.mode != 'version-only-main'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GHCR
        if: needs.release-mode.outputs.mode != 'version-only-main'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR for ORAS
        run: |
          set -euo pipefail
          printf '%s' "${{ secrets.GITHUB_TOKEN }}" \
            | oras login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Resolve existing application image for this revision
        id: existing-image
        if: needs.release-mode.outputs.mode != 'version-only-main'
        env:
          APPLICATION_IMAGE_REPOSITORY: ${{ matrix.repository }}
        run: |
          set -euo pipefail
          revision_reference="$APPLICATION_IMAGE_REPOSITORY:revision-$GITHUB_SHA"
          resolve_error="$(mktemp)"
          trap 'rm -f "$resolve_error"' EXIT

          set +e
          existing_digest="$(oras resolve "$revision_reference" 2>"$resolve_error")"
          resolve_status=$?
          set -e

          if (( resolve_status == 0 )); then
            if [[ ! "$existing_digest" =~ ^sha256:[a-f0-9]{64}$ ]]; then
              echo "Existing application image revision tag returned an invalid digest: $revision_reference -> $existing_digest" >&2
              exit 1
            fi
            echo "digest=$existing_digest" >> "$GITHUB_OUTPUT"
          elif grep -Eiq 'manifest unknown|not found|404' "$resolve_error"; then
            echo 'digest=' >> "$GITHUB_OUTPUT"
          else
            cat "$resolve_error" >&2
            exit "$resolve_status"
          fi

      - name: Reuse previous application image digest
        if: needs.release-mode.outputs.mode == 'version-only-main'
        env:
          APPLICATION_IMAGE_REPOSITORY: ${{ matrix.repository }}
          PREVIOUS_REVISION: ${{ needs.release-mode.outputs.previous_revision }}
        run: |
          set -euo pipefail
          if [[ ! "$PREVIOUS_REVISION" =~ ^[0-9a-f]{40}$ ]]; then
            echo "The version-only classifier did not provide a valid prior revision: $PREVIOUS_REVISION" >&2
            exit 1
          fi

          previous_reference="$APPLICATION_IMAGE_REPOSITORY:revision-$PREVIOUS_REVISION"
          digest="$(oras resolve "$previous_reference")"
          if [[ ! "$digest" =~ ^sha256:[a-f0-9]{64}$ ]]; then
            echo "The prior application image revision tag did not resolve to an immutable digest: $previous_reference -> $digest" >&2
            exit 1
          fi

          for tag in "revision-$GITHUB_SHA" "sha-${GITHUB_SHA:0:7}" "build-$GITHUB_RUN_NUMBER" latest; do
            oras tag "$APPLICATION_IMAGE_REPOSITORY@$digest" "$tag"
          done

          {
            echo "- Reused \`$APPLICATION_IMAGE_REPOSITORY@$digest\` from revision \`$PREVIOUS_REVISION\`."
            echo "- New tags: \`revision-$GITHUB_SHA\`, \`sha-${GITHUB_SHA:0:7}\`, \`build-$GITHUB_RUN_NUMBER\`, and \`latest\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build and push images
        if: needs.release-mode.outputs.mode != 'version-only-main' && steps.existing-image.outputs.digest == ''
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          # CI supplies the ref through the environment: the registry base
          # (IMAGE_REGISTRIES) plus the commit identity (BUILD_NUMBER, GITHUB_SHA,
          # GITHUB_REF_NAME). shipfox-docker assembles each app's sha-/build-/latest
          # tags and build metadata from it, so no turbo `--` args are needed (those
          # would bust the build cache). Only GHCR is configured; add Docker Hub by
          # appending its base to IMAGE_REGISTRIES and adding a matching login step.
          export IMAGE_REGISTRIES="ghcr.io/$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          turbo image --filter "${{ matrix.package }}"

      - name: Retag existing application image for this revision
        if: needs.release-mode.outputs.mode != 'version-only-main' && steps.existing-image.outputs.digest != ''
        env:
          APPLICATION_IMAGE_REPOSITORY: ${{ matrix.repository }}
          EXISTING_IMAGE_DIGEST: ${{ steps.existing-image.outputs.digest }}
        run: |
          set -euo pipefail
          for tag in "sha-${GITHUB_SHA:0:7}" "build-$GITHUB_RUN_NUMBER" latest; do
            oras tag "$APPLICATION_IMAGE_REPOSITORY@$EXISTING_IMAGE_DIGEST" "$tag"
          done

      - name: Claim immutable application image revision tag
        if: needs.release-mode.outputs.mode != 'version-only-main' && steps.existing-image.outputs.digest == ''
        env:
          APPLICATION_IMAGE_REPOSITORY: ${{ matrix.repository }}
        run: |
          set -euo pipefail
          build_reference="$APPLICATION_IMAGE_REPOSITORY:build-$GITHUB_RUN_NUMBER"
          digest="$(oras resolve "$build_reference")"
          if [[ ! "$digest" =~ ^sha256:[a-f0-9]{64}$ ]]; then
            echo "The current application image did not resolve to an immutable digest: $build_reference -> $digest" >&2
            exit 1
          fi
          oras tag "$APPLICATION_IMAGE_REPOSITORY@$digest" "revision-$GITHUB_SHA"

  publish-runner-image-candidate:
    name: Publish runner image candidate (${{ matrix.architecture }})
    needs: [release-mode, static-verification, external-package-contracts, tests, e2e]
    if: >-
      always() && github.ref == 'refs/heads/main' &&
      needs.release-mode.result == 'success' &&
      needs.release-mode.outputs.mode == 'normal' &&
      needs.static-verification.result == 'success' &&
      needs.external-package-contracts.result == 'success' &&
      needs.tests.result == 'success' &&
      needs.e2e.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        architecture: [amd64, arm64]
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up mise
        uses: ./.github/actions/setup-mise
        with:
          tools: node npm:pnpm npm:turbo packer

      - name: Set up pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Configure candidate AWS credentials
        uses: aws-actions/configure-aws-credentials@00943011d9042930efac3dcd3a170e4273319bc8 # v5.1.0
        with:
          aws-region: eu-central-1
          role-duration-seconds: 7200
          role-session-name: shipfox-runner-image-candidate
          role-to-assume: ${{ secrets.AWS_RUNNER_IMAGE_ROLE_ARN }}

      - name: Build runner image tooling
        run: turbo build --filter=@shipfox/runner-image...

      - name: Build runner image candidate
        env:
          BUILD_ARCH: ${{ matrix.architecture }}
          BUILD_ATTEMPT: ${{ github.run_attempt }}
          BUILD_NUMBER: ${{ github.run_number }}
          BUILD_REVISION: ${{ github.sha }}
          PACKER_LOG: "1"
          PACKER_LOG_PATH: ${{ runner.temp }}/packer-${{ matrix.architecture }}.log
          RUNNER_IMAGE_CANDIDATE_RESULT_PATH: ${{ runner.temp }}/runner-image-candidate-${{ matrix.architecture }}.json
        run: node infra/images/runner/bin/build-runner-image-candidate.js --output "$RUNNER_IMAGE_CANDIDATE_RESULT_PATH"

      - name: Report runner image candidate
        env:
          RUNNER_IMAGE_CANDIDATE_RESULT_PATH: ${{ runner.temp }}/runner-image-candidate-${{ matrix.architecture }}.json
        run: |
          set -euo pipefail
          jq -r '"- Candidate \(.architecture): \(.region):\(.amiId) for \(.revision) (\(.status))"' "$RUNNER_IMAGE_CANDIDATE_RESULT_PATH" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Packer diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: runner-image-candidate-packer-diagnostics-${{ matrix.architecture }}
          path: |
            ${{ runner.temp }}/packer-${{ matrix.architecture }}.log
            infra/images/runner/packer-manifest.json
          if-no-files-found: warn

  publish-application-release:
    name: Publish application release
    needs: [release-mode, publish-images]
    if: github.ref == 'refs/heads/main' && needs.publish-images.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up mise
        uses: ./.github/actions/setup-mise
        with:
          tools: gh node npm:pnpm npm:turbo

      - name: Set up pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Set up ORAS
        uses: oras-project/setup-oras@1d808f7d7f6995cc68b7bf507bfe5c5446e1dc9d # v2
        with:
          version: 1.3.3

      - name: Log in to GHCR
        run: |
          set -euo pipefail
          printf '%s' "${{ secrets.GITHUB_TOKEN }}" \
            | oras login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Resolve existing application release
        id: application-release
        env:
          APPLICATION_RELEASE_REPOSITORY: ghcr.io/shipfoxhq/application-releases
        run: |
          set -euo pipefail
          resolve_error="$(mktemp)"
          trap 'rm -f "$resolve_error"' EXIT

          set +e
          existing_digest="$(oras resolve "$APPLICATION_RELEASE_REPOSITORY:$GITHUB_SHA" 2>"$resolve_error")"
          resolve_status=$?
          set -e

          if (( resolve_status == 0 )); then
            if [[ ! "$existing_digest" =~ ^sha256:[a-f0-9]{64}$ ]]; then
              echo "Existing application release returned an invalid digest: $existing_digest" >&2
              exit 1
            fi
            echo "digest=$existing_digest" >> "$GITHUB_OUTPUT"
          elif grep -Eiq 'not found|404' "$resolve_error"; then
            echo 'digest=' >> "$GITHUB_OUTPUT"
          else
            cat "$resolve_error" >&2
            exit "$resolve_status"
          fi

      - name: Build application release tool
        if: steps.application-release.outputs.digest == ''
        run: turbo build --filter=@shipfox/application-release

      - name: Create application release
        if: steps.application-release.outputs.digest == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREVIOUS_REVISION: ${{ needs.release-mode.outputs.previous_revision }}
          VERSION_ONLY_MAIN: ${{ needs.release-mode.outputs.mode == 'version-only-main' }}
        run: |
          build_started_at="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" --jq '.run_started_at')"
          reuse_args=()
          if [[ "$VERSION_ONLY_MAIN" == "true" ]]; then
            reuse_args=(--reuse-from-revision "$PREVIOUS_REVISION")
          fi

          node tools/application-release/bin/application-release.js create \
            --source-repository "https://github.com/$GITHUB_REPOSITORY" \
            --revision "$GITHUB_SHA" \
            --build-system github-actions \
            --build-id "$GITHUB_RUN_ID" \
            --build-number "$GITHUB_RUN_NUMBER" \
            --build-attempt "$GITHUB_RUN_ATTEMPT" \
            --build-started-at "$build_started_at" \
            --build-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --image-tag "build-$GITHUB_RUN_NUMBER" \
            "${reuse_args[@]}" \
            --output application-release.json

          published_at="$(jq -r '.publishedAt' application-release.json)"
          echo "APPLICATION_RELEASE_PUBLISHED_AT=$published_at" >> "$GITHUB_ENV"

      # The first successful push owns the revision tag. Reruns reuse its digest
      # and only move latest, so the revision-addressed manifest stays immutable.
      - name: Publish application release
        env:
          APPLICATION_RELEASE_EXISTING_DIGEST: ${{ steps.application-release.outputs.digest }}
          APPLICATION_RELEASE_REPOSITORY: ghcr.io/shipfoxhq/application-releases
        run: |
          set -euo pipefail

          if [[ -n "$APPLICATION_RELEASE_EXISTING_DIGEST" ]]; then
            oras tag \
              "$APPLICATION_RELEASE_REPOSITORY@$APPLICATION_RELEASE_EXISTING_DIGEST" \
              latest
            echo "Reused $APPLICATION_RELEASE_REPOSITORY@$APPLICATION_RELEASE_EXISTING_DIGEST" \
              >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          oras push \
            --artifact-type application/vnd.shipfox.application-release.v1+json \
            --annotation "org.opencontainers.image.created=$APPLICATION_RELEASE_PUBLISHED_AT" \
            --annotation "org.opencontainers.image.revision=$GITHUB_SHA" \
            --annotation "org.opencontainers.image.source=https://github.com/$GITHUB_REPOSITORY" \
            --format json \
            "$APPLICATION_RELEASE_REPOSITORY:$GITHUB_SHA,latest" \
            application-release.json:application/vnd.shipfox.application-release.v1+json \
            | tee application-release-publication.json

          published_reference="$(jq -r '.reference' application-release-publication.json)"
          test -n "$published_reference"
          test "$published_reference" != "null"
          echo "Published $published_reference" >> "$GITHUB_STEP_SUMMARY"
