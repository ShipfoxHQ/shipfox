services:
  postgres:
    container_name: postgres
    image: postgres:18.4
    environment:
      POSTGRES_USER: "shipfox"
      POSTGRES_PASSWORD: "password"
      PGDATA: "/data/postgres"
    volumes:
      - postgres:/data/postgres
      - ./dev/postgres/init.sql:/docker-entrypoint-initdb.d/docker_postgres_init.sql
    ports:
      - 127.0.0.1:5432:5432
    restart: unless-stopped
    healthcheck:
      test: [CMD, pg_isready, -U, shipfox, -d, api]
      interval: 5s
      timeout: 2s
      retries: 5

  temporal:
    container_name: temporal
    image: temporalio/temporal:1.7.2
    ports:
      - 127.0.0.1:7233:7233
      - 127.0.0.1:8233:8233
    volumes:
      - temporal:/home/temporal
    command: "server start-dev --ip 0.0.0.0 --db-filename /home/temporal/temporal.db"

  garage:
    container_name: garage
    image: dxflrs/garage:v2.3.0
    volumes:
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
      - ./dev/garage/garage.toml:/etc/garage.toml:ro
    ports:
      - 127.0.0.1:3900:3900
      - 127.0.0.1:3901:3901
      - 127.0.0.1:3903:3903
    restart: unless-stopped
    healthcheck:
      test: [CMD, /garage, status]
      interval: 3s
      timeout: 2s
      retries: 10

  garage-init:
    image: alpine:3.23
    depends_on:
      garage:
        condition: service_healthy
    volumes:
      - ./dev/garage/bootstrap.sh:/bootstrap.sh:ro
    environment:
      GARAGE_URL: http://garage:3903
      GARAGE_S3_ENDPOINT: http://garage:3900
    entrypoint: [sh, -c, apk add --no-cache curl jq aws-cli >/dev/null && /bootstrap.sh]
    restart: "no"

  gitea:
    container_name: gitea
    # Pinned >= 1.26.2: that release fixes CVE-2026-28744 / CVE-2026-28699, which
    # let the git-http clone path skip repository token-scope checks — the exact
    # path the provider's checkout uses. See ENG-541.
    image: gitea/gitea:1.26.2
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      GITEA__database__DB_TYPE: sqlite3
      GITEA__security__INSTALL_LOCK: "true"
      # The bootstrap registers the first user, whom Gitea promotes to site admin;
      # registration must stay open for that one call (dev-only, instance is local).
      GITEA__service__DISABLE_REGISTRATION: "false"
      # ROOT_URL fixes the clone/html URLs Gitea hands back. localhost is reachable
      # from both the host-run API and the host-run runner, which is where the
      # clone happens in dev.
      GITEA__server__ROOT_URL: http://localhost:3000/
      GITEA__server__DOMAIN: localhost
      GITEA__server__HTTP_PORT: "3000"
      # Built-in SSH server on a published port, ready for the deploy-key checkout
      # model (ENG-544); the advertised SSH clone URL is ssh://git@localhost:2222.
      GITEA__server__START_SSH_SERVER: "true"
      GITEA__server__SSH_DOMAIN: localhost
      GITEA__server__SSH_PORT: "2222"
      GITEA__server__SSH_LISTEN_PORT: "2222"
      # Gitea refuses webhook delivery to private/loopback hosts by default; the dev
      # webhook target is host.docker.internal, so allow everything (dev-only).
      GITEA__webhook__ALLOWED_HOST_LIST: "*"
      GITEA__log__LEVEL: warn
    volumes:
      - gitea:/data
    ports:
      - 127.0.0.1:3000:3000
      - 127.0.0.1:2222:2222
    restart: unless-stopped
    healthcheck:
      test: [CMD, wget, -q, -O, "-", "http://127.0.0.1:3000/api/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  gitea-init:
    image: alpine:3.23
    depends_on:
      gitea:
        condition: service_healthy
    volumes:
      - ./dev/gitea/bootstrap.sh:/bootstrap.sh:ro
      - ./dev/gitea/seed:/seed:ro
    environment:
      GITEA_URL: http://gitea:3000
      # Must match apps/api/.env (GITEA_SERVICE_USERNAME / GITEA_SERVICE_TOKEN):
      # the provider authenticates as this bot with the password as its secret.
      GITEA_SERVICE_USERNAME: shipfox-bot
      GITEA_SERVICE_TOKEN: shipfox-bot-dev-password
      GITEA_ORG: shipfox-demo
    entrypoint: [sh, -c, apk add --no-cache curl jq >/dev/null && /bootstrap.sh]
    restart: "no"

volumes:
  postgres:
  temporal:
  garage_meta:
  garage_data:
  gitea:
