services:
  postgres:
    container_name: postgres
    image: postgres:18.4
    environment:
      POSTGRES_USER: "shipfox"
      POSTGRES_PASSWORD: "password"
      PGDATA: "/data/postgres"
    volumes:
      - postgres:/data/postgres
      - ./dev/postgres/init.sql:/docker-entrypoint-initdb.d/docker_postgres_init.sql
    ports:
      - 127.0.0.1:5432:5432
    restart: unless-stopped
    healthcheck:
      test: [CMD, pg_isready, -U, shipfox, -d, api]
      interval: 5s
      timeout: 2s
      retries: 5

  temporal:
    container_name: temporal
    image: temporalio/temporal:1.7.2
    ports:
      - 127.0.0.1:7233:7233
      - 127.0.0.1:8233:8233
    volumes:
      - temporal:/home/temporal
    command: "server start-dev --ip 0.0.0.0 --db-filename /home/temporal/temporal.db"

  # S3-compatible object storage for runner logs. Garage is self-host-oriented;
  # any S3-compatible endpoint works in production. Run ./dev/garage/bootstrap.sh
  # once after first start to create the layout, bucket, and access key.
  garage:
    container_name: garage
    image: dxflrs/garage:v1.0.1
    volumes:
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
      - ./dev/garage/garage.toml:/etc/garage.toml:ro
    ports:
      - 127.0.0.1:3900:3900
      - 127.0.0.1:3901:3901
      - 127.0.0.1:3903:3903
    restart: unless-stopped

volumes:
  postgres:
  temporal:
  garage_meta:
  garage_data:
