# Provisioner runner templates for the platform workflow E2E suite.
# Global setup rewrites every `image` to E2E_RUNNER_IMAGE (default runner:ci, the tag
# `turbo image --filter=@shipfox/runner` loads locally and in CI) before handing this
# to the child provisioner, so the labels and sizing here are the source of truth and
# the image stays configurable.
templates:
  e2e-default:
    labels: [e2e]
    image: runner:ci
    cpu: 1
    memory: 1GiB
    max_concurrency: 8
  e2e-alt:
    labels: [e2e-alt]
    image: runner:ci
    cpu: 1
    memory: 1GiB
    max_concurrency: 2
