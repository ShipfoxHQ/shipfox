name: Gate evaluation error
runner: __RUNNER_LABEL__
triggers:
  on_push:
    source: __GITEA_SOURCE__
    event: push
    filter: 'event.ref == "refs/heads/main" && event.repository.full_name == "__GITEA_REPOSITORY__"'
jobs:
  build:
    steps:
      - key: gate-error
        run: |
          echo "gate expression will fail"
        gate:
          success_if: 1 / 0 == 1
