name: Gate success if
runner: __RUNNER_LABEL__
triggers:
  on_push:
    source: __GITEA_SOURCE__
    event: push
    filter: 'event.ref == "refs/heads/main" && event.repository.full_name == "__GITEA_REPOSITORY__"'
jobs:
  build:
    steps:
      - key: nonzero-ok
        run: |
          echo "gate accepts exit 1"
          exit 1
        gate:
          success_if: step.exit_code == 1
