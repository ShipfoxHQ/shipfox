name: Job output build deploy
runner: __RUNNER_LABEL__
triggers:
  on_push:
    source: __GITEA_SOURCE__
    event: push
    filter: 'event.ref == "refs/heads/main" && event.repository.full_name == "__GITEA_REPOSITORY__"'
jobs:
  build:
    steps:
      - key: image
        run: |
          echo "image_sha=sha-123" >> "$SHIPFOX_OUTPUT"
          echo "built image"
    outputs:
      image_sha: ${{ steps.image.outputs.image_sha }}
  deploy:
    needs: build
    steps:
      - key: deploy
        env:
          IMAGE_SHA: ${{ jobs.build.outputs.image_sha }}
        run: |
          echo "deploying image $IMAGE_SHA"
