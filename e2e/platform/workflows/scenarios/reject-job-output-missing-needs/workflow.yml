name: Reject job output missing needs
runner: __RUNNER_LABEL__
triggers:
  on_push:
    source: __GITEA_SOURCE__
    event: push
    filter: 'event.ref == "refs/heads/main" && event.repository.full_name == "__GITEA_REPOSITORY__"'
jobs:
  build:
    steps:
      - key: image
        run: echo "image_sha=sha-123" >> "$SHIPFOX_OUTPUT"
    outputs:
      image_sha: ${{ steps.image.outputs.image_sha }}
  deploy:
    steps:
      - key: deploy
        env:
          IMAGE_SHA: ${{ jobs.build.outputs.image_sha }}
        run: echo "deploying image $IMAGE_SHA"
