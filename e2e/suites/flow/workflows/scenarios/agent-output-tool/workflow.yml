name: __MODEL_PROVIDER__
runner: __RUNNER_LABEL__
triggers:
  manual:
    source: manual
    event: fire
jobs:
  fix:
    steps:
      - key: produce
        harness: pi
        provider: __MODEL_PROVIDER__
        model: __AGENT_MODEL__
        thinking: off
        prompt: |
          Set the message output.
        outputs:
          message: string
      - key: consume
        env:
          MESSAGE: ${{ steps.produce.outputs.message }}
        run: |
          echo "agent_message=$MESSAGE"
