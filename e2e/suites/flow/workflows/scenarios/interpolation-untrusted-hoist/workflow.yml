name: Interpolation untrusted hoist
runner: __RUNNER_LABEL__
triggers:
  on_push:
    source: __GITEA_SOURCE__
    event: push
    filter: 'event.ref == "refs/heads/main" && event.repository.full_name == "__GITEA_REPOSITORY__"'
jobs:
  build:
    steps:
      - key: echo-message
        env:
          MSG: '${{ event.head_commit.message }}'
        run: |
          printf 'msg=%s\n' "$MSG"
